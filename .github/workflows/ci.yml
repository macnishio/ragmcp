name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install
      - run: npm run type-check
      - run: npm test
      - run: npm run build

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: flutter_app
        run: flutter pub get
      - working-directory: flutter_app
        run: flutter analyze
      - working-directory: flutter_app
        run: flutter test
