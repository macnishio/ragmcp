name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  server_executables:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: server-linux
          - os: windows-latest
            artifact_name: server-windows
          - os: macos-latest
            artifact_name: server-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm run sea:build
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/sea/ragmcp-server-*

  server_bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm run bundle
      - run: mkdir -p artifacts && cp build/ragmcp-server.mjs artifacts/ragmcp-server-bundle.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: server-bundle
          path: artifacts/ragmcp-server-bundle.mjs

  flutter_macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm run sea:build
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: flutter_app
        run: flutter pub get
      - working-directory: flutter_app
        run: flutter build macos --release
      - name: Bundle SEA server into macOS app
        run: |
          APP_DIR="flutter_app/build/macos/Build/Products/Release/flutter_app.app/Contents/Resources"
          cp build/sea/ragmcp-server-darwin-arm64 "$APP_DIR/"
          chmod +x "$APP_DIR/ragmcp-server-darwin-arm64"
      - working-directory: flutter_app
        run: ditto -c -k build/macos/Build/Products/Release macos-release.zip
      - uses: actions/upload-artifact@v4
        with:
          name: app-macos
          path: flutter_app/macos-release.zip

  flutter_linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm run sea:build
      - name: Copy SEA binary for Flutter bundle
        run: cp build/sea/ragmcp-server-linux-x64 flutter_app/ragmcp-server-linux-x64
      - run: sudo apt-get update
      - run: sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: flutter_app
        run: flutter pub get
      - working-directory: flutter_app
        run: flutter build linux --release
      - working-directory: flutter_app
        run: tar -czf linux-release.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: app-linux
          path: flutter_app/linux-release.tar.gz

  flutter_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm run sea:build
      - name: Copy SEA binary for Flutter bundle
        run: copy build\sea\ragmcp-server-win32-x64.exe flutter_app\ragmcp-server-win32-x64.exe
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: flutter_app
        run: flutter pub get
      - working-directory: flutter_app
        run: flutter build windows --release
      - shell: pwsh
        working-directory: flutter_app
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath windows-release.zip
      - uses: actions/upload-artifact@v4
        with:
          name: app-windows
          path: flutter_app/windows-release.zip

  flutter_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: flutter_app
        run: flutter pub get
      - working-directory: flutter_app
        run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-android
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

  publish_release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - server_executables
      - server_bundle
      - flutter_macos
      - flutter_linux
      - flutter_windows
      - flutter_android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/server-linux/ragmcp-server-*
            release-artifacts/server-windows/ragmcp-server-*.exe
            release-artifacts/server-macos/ragmcp-server-*
            release-artifacts/server-bundle/ragmcp-server-bundle.mjs
            release-artifacts/app-macos/macos-release.zip
            release-artifacts/app-linux/linux-release.tar.gz
            release-artifacts/app-windows/windows-release.zip
            release-artifacts/app-android/app-release.apk
